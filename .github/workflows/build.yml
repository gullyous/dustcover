name: build

# Build the standalone Windows .exe. Runs on every version tag (e.g. v1.0.0)
# and can be triggered manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # allow attaching the .exe to a Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate app icon
        env:
          QT_QPA_PLATFORM: offscreen
        run: python make_icon.py

      - name: Build executable
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name TidalNowPlaying --icon icon.ico
          --collect-all winsdk --collect-all tidalapi --collect-all pynput main.py

      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $h = (Get-FileHash dist/TidalNowPlaying.exe -Algorithm SHA256).Hash.ToLower()
          # sha256sum-compatible format: "<hex>  <name>"
          "$h  TidalNowPlaying.exe" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii -NoNewline
          Get-Content dist/SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalNowPlaying
          path: |
            dist/TidalNowPlaying.exe
            dist/SHA256SUMS.txt

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TIDAL Now-Playing Widget ${{ github.ref_name }}
          files: |
            dist/TidalNowPlaying.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          append_body: true
          body: |
            A dark-glass desktop widget for Windows that shows your current
            **TIDAL** track with transport controls, seek, a system-tray icon,
            optional TIDAL favorites, and an "available in" quality badge.

            ### Download
            Grab **`TidalNowPlaying.exe`** below and double-click it (open TIDAL
            and play a track first). No install and no Python needed; the first
            launch takes a few seconds to unpack. The app is unsigned, so Windows
            SmartScreen may warn the first time, choose **More info -> Run anyway**.

            ### Highlights
            - Live cover, title, artist; compact and expanded views
            - Play / pause, next / prev, seekable progress bar
            - Blurred album-art background, configurable transparency and accent
            - System-tray controls, global hotkeys, run-at-startup
            - Drag-to-reposition that locks into the nearest screen corner
            - Optional: favorite the current track to your TIDAL collection, plus
              a badge for the best quality it is available in (MAX / Hi-Res / Lossless)
