name: build

# Build the standalone Windows .exe. Runs on every version tag (e.g. v1.0.0)
# and can be triggered manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # allow attaching the .exe to a Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate app icon
        env:
          QT_QPA_PLATFORM: offscreen
        run: python make_icon.py

      - name: Build executable
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name TidalNowPlaying --icon icon.ico
          --collect-all winsdk main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalNowPlaying
          path: dist/TidalNowPlaying.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TidalNowPlaying.exe
