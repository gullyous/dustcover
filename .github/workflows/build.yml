name: build

# Build the standalone Windows .exe. Runs on every version tag (e.g. v1.0.0)
# and can be triggered manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # allow attaching the .exe to a Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate app icon
        env:
          QT_QPA_PLATFORM: offscreen
        run: python make_icon.py

      - name: Build executable
        run: pyinstaller --noconfirm --clean Dustcover.spec

      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $h = (Get-FileHash dist/Dustcover.exe -Algorithm SHA256).Hash.ToLower()
          # sha256sum-compatible format: "<hex>  <name>"
          "$h  Dustcover.exe" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii -NoNewline
          Get-Content dist/SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dustcover
          path: |
            dist/Dustcover.exe
            dist/SHA256SUMS.txt

      # The release body is this version's CHANGELOG section: people who
      # already have the app installed see what changed in the update dialog,
      # not a description of a program they are running.
      - name: Compose release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: python make_release_body.py ${{ github.ref_name }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Dustcover ${{ github.ref_name }}
          files: |
            dist/Dustcover.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          append_body: true
          body_path: dist/release_body.md
