name: check

# Validate every push and pull request (the release build only runs on tags,
# so without this nothing checks the code between releases).
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Byte-compile all modules
        run: python -m compileall -q main.py widget.py media_backend.py lyrics_backend.py tidal_likes.py volume_backend.py fullscreen_watch.py discord_backend.py scrobble_backend.py obs_overlay.py ambient.py update_dialog.py config.py settings.py settings_dialog.py hotkeys.py icons.py updater.py make_release_body.py

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests -v
